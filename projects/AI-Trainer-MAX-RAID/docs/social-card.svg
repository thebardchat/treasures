<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#0a0a14;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#000a00;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="greenglow">
      <feGaussianBlur stdDeviation="7" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Neural network visualization -->
  <g opacity="0.2" stroke="#22d3ee" stroke-width="1" fill="none">
    <!-- Layer 1 nodes -->
    <circle cx="820" cy="150" r="8" fill="#22d3ee"/>
    <circle cx="820" cy="220" r="8" fill="#22d3ee"/>
    <circle cx="820" cy="290" r="8" fill="#22d3ee"/>
    <circle cx="820" cy="360" r="8" fill="#22d3ee"/>
    <circle cx="820" cy="430" r="8" fill="#22d3ee"/>
    <!-- Layer 2 -->
    <circle cx="940" cy="175" r="8" fill="#10b981"/>
    <circle cx="940" cy="265" r="8" fill="#10b981"/>
    <circle cx="940" cy="355" r="8" fill="#10b981"/>
    <circle cx="940" cy="445" r="8" fill="#10b981"/>
    <!-- Layer 3 -->
    <circle cx="1060" cy="200" r="8" fill="#22d3ee"/>
    <circle cx="1060" cy="315" r="8" fill="#22d3ee"/>
    <circle cx="1060" cy="430" r="8" fill="#22d3ee"/>
    <!-- Output -->
    <circle cx="1150" cy="290" r="12" fill="#10b981" stroke="#10b981" stroke-width="2"/>
    <!-- Connections layer 1-2 -->
    <line x1="820" y1="150" x2="940" y2="175"/><line x1="820" y1="150" x2="940" y2="265"/>
    <line x1="820" y1="220" x2="940" y2="175"/><line x1="820" y1="220" x2="940" y2="265"/>
    <line x1="820" y1="290" x2="940" y2="265"/><line x1="820" y1="290" x2="940" y2="355"/>
    <line x1="820" y1="360" x2="940" y2="355"/><line x1="820" y1="360" x2="940" y2="445"/>
    <line x1="820" y1="430" x2="940" y2="445"/><line x1="820" y1="430" x2="940" y2="355"/>
    <!-- Connections layer 2-3 -->
    <line x1="940" y1="175" x2="1060" y2="200"/><line x1="940" y1="175" x2="1060" y2="315"/>
    <line x1="940" y1="265" x2="1060" y2="200"/><line x1="940" y1="265" x2="1060" y2="315"/>
    <line x1="940" y1="355" x2="1060" y2="315"/><line x1="940" y1="355" x2="1060" y2="430"/>
    <line x1="940" y1="445" x2="1060" y2="430"/><line x1="940" y1="445" x2="1060" y2="315"/>
    <!-- Connections layer 3-output -->
    <line x1="1060" y1="200" x2="1150" y2="290"/>
    <line x1="1060" y1="315" x2="1150" y2="290"/>
    <line x1="1060" y1="430" x2="1150" y2="290"/>
  </g>

  <!-- Scan lines -->
  <g stroke="#00ff41" stroke-width="0.5" opacity="0.04">
    <line x1="0" y1="40" x2="1200" y2="40"/>
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="280" x2="1200" y2="280"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="440" x2="1200" y2="440"/>
    <line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="520" x2="1200" y2="520"/>
    <line x1="0" y1="560" x2="1200" y2="560"/>
  </g>

  <!-- Corner brackets -->
  <g stroke="#10b981" stroke-width="2" fill="none" opacity="0.7">
    <polyline points="20,20 20,70 70,70"/>
    <polyline points="1180,20 1180,70 1130,70"/>
    <polyline points="20,610 20,560 70,560"/>
    <polyline points="1180,610 1180,560 1130,560"/>
  </g>

  <!-- Training progress bar (decorative) -->
  <text x="100" y="65" font-family="monospace" font-size="12" fill="#065f46">EPOCH 4096 ▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓░ 97.3% ACCURACY</text>

  <!-- Main titles -->
  <text x="100" y="170" font-family="monospace" font-size="55" font-weight="bold" fill="#22d3ee" filter="url(#glow)">AI TRAINER</text>
  <text x="100" y="260" font-family="monospace" font-size="100" font-weight="bold" fill="#10b981" filter="url(#greenglow)">MAX</text>

  <!-- Divider -->
  <line x1="100" y1="285" x2="700" y2="285" stroke="#10b981" stroke-width="2" opacity="0.5"/>

  <!-- Tagline -->
  <text x="100" y="320" font-family="monospace" font-size="18" fill="#6ee7b7">Intelligent AI training and fine-tuning system</text>

  <!-- Feature grid -->
  <g font-family="monospace">
    <rect x="100" y="345" width="170" height="55" rx="6" fill="#001a0a" stroke="#10b981" stroke-width="1.5"/>
    <text x="185" y="368" text-anchor="middle" fill="#10b981" font-size="18" font-weight="bold">TRAIN</text>
    <text x="185" y="387" text-anchor="middle" fill="#065f46" font-size="11">MODEL TUNING</text>

    <rect x="282" y="345" width="170" height="55" rx="6" fill="#001a0a" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="367" y="368" text-anchor="middle" fill="#22d3ee" font-size="18" font-weight="bold">EVAL</text>
    <text x="367" y="387" text-anchor="middle" fill="#065f46" font-size="11">BENCHMARKS</text>

    <rect x="464" y="345" width="170" height="55" rx="6" fill="#001a0a" stroke="#10b981" stroke-width="1.5"/>
    <text x="549" y="368" text-anchor="middle" fill="#6ee7b7" font-size="18" font-weight="bold">DEPLOY</text>
    <text x="549" y="387" text-anchor="middle" fill="#065f46" font-size="11">PIPELINE</text>
  </g>

  <!-- Tech stack -->
  <g font-family="monospace" font-size="13" fill="#374151">
    <text x="100" y="430">Training pipeline · Model evaluation · Fine-tuning workflows · Inference optimization</text>
  </g>

  <!-- Metrics row -->
  <g font-family="monospace" font-size="12" fill="#047857">
    <text x="105" y="465">▸ Loss: 0.0043   ▸ Accuracy: 97.3%   ▸ Perplexity: 1.82</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="#000a00" opacity="0.95"/>
  <line x1="0" y1="580" x2="1200" y2="580" stroke="#10b981" stroke-width="1" opacity="0.5"/>
  <text x="30" y="611" font-family="monospace" font-size="13" fill="#047857">github.com/thebardchat/AI-Trainer-MAX</text>
  <text x="1170" y="611" text-anchor="end" font-family="monospace" font-size="13" fill="#374151">Built by Shane + Claude Anthropic</text>
</svg>
